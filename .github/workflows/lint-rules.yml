name: Lint Mihomo rules

on:
  push:
    paths:
      - "rules/**"
      - "rules-manifest.yaml"
      - "tools/lint_rules.py"
      - ".github/workflows/lint-rules.yml"
  pull_request:
    paths:
      - "rules/**"
      - "rules-manifest.yaml"
      - "tools/lint_rules.py"
      - ".github/workflows/lint-rules.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate rule files
        run: python tools/lint_rules.py
